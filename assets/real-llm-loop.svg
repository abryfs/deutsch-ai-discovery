<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Multi-round real model oracle loop</title>
  <desc id="desc">A real model proposes tests from an experiment pool, receives oracle observations, revises, and only then predicts hidden holdout and transfer cases.</desc>
  <rect width="980" height="360" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="40" y="52" font-size="28" font-weight="700" fill="#0f172a">What Enables The Real Discovery Test?</text>
    <text x="40" y="82" font-size="15" fill="#475569">The model must be allowed to criticize its own explanation by choosing risky experiments.</text>

    <rect x="48" y="128" width="170" height="86" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="278" y="128" width="170" height="86" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="508" y="128" width="170" height="86" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="738" y="128" width="170" height="86" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>

    <text x="133" y="160" font-size="16" font-weight="700" text-anchor="middle" fill="#0f172a">Real model</text>
    <text x="133" y="184" font-size="13" text-anchor="middle" fill="#475569">conjectures a cause</text>
    <text x="363" y="160" font-size="16" font-weight="700" text-anchor="middle" fill="#0f172a">Risky test</text>
    <text x="363" y="184" font-size="13" text-anchor="middle" fill="#475569">chosen from allowed pool</text>
    <text x="593" y="160" font-size="16" font-weight="700" text-anchor="middle" fill="#0f172a">Oracle result</text>
    <text x="593" y="184" font-size="13" text-anchor="middle" fill="#475569">one new observation</text>
    <text x="823" y="160" font-size="16" font-weight="700" text-anchor="middle" fill="#0f172a">Final score</text>
    <text x="823" y="184" font-size="13" text-anchor="middle" fill="#475569">hidden holdout + reach</text>

    <g stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
      <path d="M218 171 H270"/>
      <path d="M448 171 H500"/>
      <path d="M678 171 H730"/>
      <path d="M593 214 C593 286 133 286 133 222"/>
    </g>
    <text x="365" y="294" font-size="13" fill="#475569" text-anchor="middle">repeat for N rounds before scoring</text>

    <rect x="92" y="246" width="790" height="50" rx="12" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="116" y="277" font-size="14" fill="#92400e">Scored holdout and transfer cases are never available for oracle queries.</text>
  </g>
</svg>
